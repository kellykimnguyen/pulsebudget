<!doctype html>
<html lang="en">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0" />
  <title>PulseBudget — Finance Planner</title>
  <link rel="stylesheet" href="styles.css" />
  <script src="https://cdn.jsdelivr.net/npm/chart.js"></script>
</head>
<body>
  <header class="topbar">
    <h1>PulseBudget</h1>
    <p>All your spending, saving, and investments in one place.</p>
    <button id="connectBankBtn" class="primary">Connect Bank</button>
  </header>

  <main class="grid">
    <section class="panel">
      <h2>Accounts Snapshot</h2>
      <div id="accountsList" class="list"></div>
      <form id="accountForm" class="form">
        <h3>Add Account</h3>
        <input required name="name" placeholder="Account name (e.g., Chase Freedom)" />
        <select required name="type">
          <option value="credit">Credit Card</option>
          <option value="debit">Debit Card</option>
          <option value="savings">Savings</option>
          <option value="hysa">HYSA</option>
          <option value="roth_ira">Roth IRA</option>
          <option value="investment">Investment</option>
        </select>
        <input required name="balance" type="number" step="0.01" placeholder="Balance" />
        <button class="primary" type="submit">Add Account</button>
      </form>
    </section>

    <section class="panel">
      <h2>Spending Tracker</h2>
      <div class="toolbar">
        <label>View:
          <select id="spendRange">
            <option value="daily">Daily</option>
            <option value="weekly">Weekly</option>
            <option value="monthly" selected>Monthly</option>
            <option value="yearly">Yearly</option>
          </select>
        </label>
      </div>
      <canvas id="spendingChart"></canvas>
      <form id="expenseForm" class="form">
        <h3>Add Expense</h3>
        <input required name="label" placeholder="Expense label (Rent, Utilities, etc.)" />
        <input required name="amount" type="number" step="0.01" placeholder="Amount" />
        <select required name="category">
          <option value="Rent">Rent</option>
          <option value="Bills">Bills</option>
          <option value="Food">Food</option>
          <option value="Transport">Transport</option>
          <option value="Entertainment">Entertainment</option>
          <option value="Other">Other</option>
        </select>
        <button class="primary" type="submit">Add Expense</button>
      </form>
    </section>

    <section class="panel">
      <h2>Savings Goals</h2>
      <div id="goalsList" class="list"></div>
      <canvas id="goalsChart"></canvas>
      <form id="goalForm" class="form">
        <h3>Add Goal</h3>
        <input required name="name" placeholder="Goal name" />
        <input required name="target" type="number" step="0.01" placeholder="Target amount" />
        <input required name="saved" type="number" step="0.01" placeholder="Saved so far" />
        <button class="primary" type="submit">Add Goal</button>
      </form>
    </section>

    <section class="panel">
      <h2>Stock Watcher</h2>
      <div id="stockList" class="list"></div>
      <form id="stockForm" class="form">
        <h3>Add Ticker</h3>
        <input required name="symbol" placeholder="AAPL" />
        <input required name="price" type="number" step="0.01" placeholder="Current price" />
        <button class="primary" type="submit">Add Ticker</button>
      </form>
      <p class="muted">Tip: hook this up to a market API for live prices.</p>
    </section>
  </main>

  <template id="rowTemplate">
    <div class="row">
      <span class="name"></span>
      <span class="meta"></span>
    </div>
  </template>

  <script src="app.js"></script>
</body>
</html>
